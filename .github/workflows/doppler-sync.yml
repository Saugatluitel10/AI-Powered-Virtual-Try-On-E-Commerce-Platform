name: Sync Doppler Secrets

on:
  workflow_dispatch: # Run manually when secrets change

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        run: |
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
            'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
            | sudo apt-key add -
          echo "deb https://packages.doppler.com/public/cli/deb/debian any-version main" \
            | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler

      - name: Sync to Railway (backend)
        run: doppler secrets download --no-file --format=env | railway variables set -
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
