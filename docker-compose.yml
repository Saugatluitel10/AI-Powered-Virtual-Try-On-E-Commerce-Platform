version: "3.9"

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vtryon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Main API: Node.js + Express + Prisma + Supabase ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vtryon_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    command: npm run dev

  # ─── AI Microservice: Python FastAPI (OOTDiffusion/IDM-VTON, MediaPipe, SAM 2, Claude) ──
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vtryon_ai
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ─── Frontend: Next.js 14 ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vtryon_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  redis_data:
