version: "3.9"

services:
  # ─── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vtryon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vtryon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vtryon"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vtryon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Main API: Node.js + Express + Prisma ───────────────────────────────────
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vtryon_backend
    restart: unless-stopped
    env_file:
      - apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # ─── AI Microservice: Python FastAPI ────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: vtryon_ai
    restart: unless-stopped
    env_file:
      - apps/ai-service/.env
    ports:
      - "8001:8001"
    volumes:
      - ./apps/ai-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ─── Frontend: Next.js 14 ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: vtryon_frontend
    restart: unless-stopped
    env_file:
      - apps/web/.env.local
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
